<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Перенаправление...</title>
    <script>
        // Функция для извлечения параметров из URL (и из search, и из hash)
        function getParameterByName(name, url) {
            url = url || window.location.href;
            // Сначала ищем в search
            let regex = new RegExp('[?&]' + name + '=([^&#]*)');
            let results = regex.exec(url);
            if (results) return decodeURIComponent(results[1]);
            // Если не нашли, ищем в hash
            regex = new RegExp('[#&]' + name + '=([^&#]*)');
            results = regex.exec(url);
            return results ? decodeURIComponent(results[1]) : null;
        }

        const accessToken = getParameterByName('access_token');
        const refreshToken = getParameterByName('refresh_token');

        if (accessToken && refreshToken) {
            // Перенаправляем в приложение
            window.location.href = `myapp://reset-password?access_token=${accessToken}&refresh_token=${refreshToken}`;
        } else {
            document.body.innerHTML = 'Ссылка недействительна. Пожалуйста, запросите сброс пароля заново.';
        }
    </script>
</head>
<body>
    <p>Перенаправление...</p>
</body>
</html>
